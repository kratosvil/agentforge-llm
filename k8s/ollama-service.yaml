apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agentforge
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: api
  # ClusterIP: solo accesible dentro del cluster
  # AgentForge server se conecta via http://ollama:11434
  type: ClusterIP
